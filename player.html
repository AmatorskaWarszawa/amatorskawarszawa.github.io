<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Zawodnik — Amatorska Warszawa</title>
  <style>
    body{font-family:Arial, sans-serif; background:#0b1220;color:#fff;margin:0}
    header{padding:20px;text-align:center;background:#111a2e}
    .wrap{max-width:900px;margin:0 auto;padding:20px}
    .card{background:#121c33;border:1px solid #223255;border-radius:12px;padding:16px;margin:12px 0}
    .muted{opacity:.8}
    .stats{display:flex;gap:12px;flex-wrap:wrap}
    .stat{background:#0f1724;padding:12px;border-radius:10px;min-width:120px;text-align:center}
    .big{font-size:28px;font-weight:700}
    .small{opacity:.8;font-size:13px}
    a{color:#66a3ff}
  </style>
</head>
<body>
<header><h1 id="title">Zawodnik</h1><p class="muted"><a href="druzyny.html">← Wróć</a></p></header>
<div class="wrap">
  <div id="playerCard" class="card">
    <div style="display:flex;gap:14px;align-items:center">
      <div style="width:84px;height:84px;border-radius:8px;background:#0b1220;border:1px solid rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;font-weight:700">P</div>
      <div>
        <h2 id="pname" style="margin:0">Ładuję...</h2>
        <div id="pmeta" class="muted"></div>
      </div>
    </div>
  </div>

  <div class="card">
    <h3 style="margin-top:0">Statystyki</h3>
    <div class="stats">
      <div class="stat">
        <div class="big" id="stat_matches">—</div>
        <div class="small">Mecze</div>
      </div>
      <div class="stat">
        <div class="big" id="stat_goals">—</div>
        <div class="small">Gole</div>
      </div>
      <div class="stat">
        <div class="big" id="stat_assists">—</div>
        <div class="small">Asysty</div>
      </div>
    </div>
  </div>

  <div class="card">
    <h3 style="margin-top:0">Ostatnie mecze (gdzie grał)</h3>
    <div id="recentMatches" class="muted">Ładuję...</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL = "https://wtyxtjnkioowrgagkveu.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_Ca6_0d1RBm2j6tYghXSqxQ_KslA8cKk";
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  const el = id => document.getElementById(id);

  function qParam(name){
    return new URLSearchParams(location.search).get(name);
  }

  function escapeHtml(s){ return String(s||"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

  async function loadPlayer(){
    const playerId = qParam("id");
    if(!playerId){ el("pname").textContent = "Brak id"; return; }

    // 1) pobierz podstawy zawodnika
    const { data: player, error: pErr } = await sb.from("players").select("id, team_id, full_name, position, number, birth_year, notes, team_id").eq("id", playerId).single();
    if(pErr || !player){
      el("pname").textContent = "Nie znaleziono zawodnika";
      el("pmeta").textContent = pErr ? pErr.message : "";
      return;
    }
    el("pname").textContent = player.full_name;
    el("pmeta").textContent = `${player.position ? player.position + " • " : ""}${player.number ? "#" + player.number : ""} ${player.birth_year ? "• rocznik " + player.birth_year : ""}`;

    // 2) Mecze rozegrane = count appearances where player_id = X
    const { count: matchesCount, error: mErr } = await sb.from("appearances").select("id", { count: "exact", head: true }).eq("player_id", playerId);
    el("stat_matches").textContent = (mErr ? "0" : (matchesCount || 0));

    // 3) Gole = count match_events where player_id=X and event_type='goal'
    const { count: goalsCount, error: gErr } = await sb.from("match_events").select("id", { count: "exact", head: true }).eq("player_id", playerId).eq("event_type", "goal");
    el("stat_goals").textContent = (gErr ? "0" : (goalsCount || 0));

    // 4) Asysty = count match_events where event_type='assist'
    const { count: assistsCount, error: aErr } = await sb.from("match_events").select("id", { count: "exact", head: true }).eq("player_id", playerId).eq("event_type", "assist");
    el("stat_assists").textContent = (aErr ? "0" : (assistsCount || 0));

    // 5) Ostatnie mecze: pobierz matches powiązane z appearances (JOIN)
    const { data: recent, error: rErr } = await sb
      .from("appearances")
      .select(`
        match_id,
        match:matches(id, match_date, home_team_id, away_team_id, home_score, away_score, league),
        team:teams(id, team_name)
      `)
      .eq("player_id", playerId)
      .order("created_at", { ascending: false })
      .limit(10);

    if(rErr){
      el("recentMatches").textContent = "Błąd ładowania meczów: " + rErr.message;
    } else if(!recent || recent.length === 0){
      el("recentMatches").textContent = "Brak zapisanych meczów (appearances).";
    } else {
      el("recentMatches").innerHTML = recent.map(r => {
        const m = r.match;
        const teamSide = r.team;
        const vs = (m.home_team_id === teamSide.id) ? `vs ${escapeHtml(m.away_team_id ? String(m.away_team_id) : "—")}` : `@ ${escapeHtml(m.home_team_id ? String(m.home_team_id) : "—")}`;
        // NOTE: jeśli chcesz nazwy przeciwnika, można rozszerzyć query do dołączenia nazw drużyn (jak w team.html)
        return `<div style="padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04)">
          <div class="small">${m.match_date}</div>
          <div><b>${escapeHtml(teamSide.team_name)}</b> ${vs} — ${m.home_score ?? "?"}:${m.away_score ?? "?"} <span class="muted small">(${escapeHtml(m.league||"")})</span></div>
        </div>`;
      }).join("");
    }
  }

  loadPlayer();
</script>
</body>
</html>
