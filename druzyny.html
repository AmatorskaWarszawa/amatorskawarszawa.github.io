<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Drużyny — Amatorska Warszawa</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background:#0b1220; color:#fff; }
    header { padding: 30px 20px; text-align:center; background:#111a2e; }
    .wrap { max-width: 1000px; margin: 0 auto; padding: 20px; }
    a { color:#66a3ff; text-decoration:none; }

    .grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap:14px; }

    .team-card{
      background:#121c33;
      border:1px solid #223255;
      border-radius:16px;
      padding:16px;
      display:flex;
      gap:14px;
      align-items:center;
      transition:0.25s;
    }
    .team-card:hover{ transform: translateY(-4px); border-color:#66a3ff; }

    .team-logo{
      width:70px;
      height:70px;
      border-radius:14px;
      object-fit:cover;
      background:#0b1220;
      border:1px solid rgba(255,255,255,0.08);
      flex: 0 0 70px;
    }

    .team-name{ margin:0; font-size:18px; }
    .team-meta{ margin:6px 0 0; opacity:.8; font-size:14px; }

    .btn{
      display:inline-block;
      margin-top:10px;
      padding:10px 14px;
      background:#66a3ff;
      color:#fff;
      border-radius:10px;
      font-weight:bold;
    }
    .btn:hover{ background:#4d8ae6; }
  </style>
</head>
<body>

<header>
  <h1>Baza drużyn</h1>
  <p>Tu będzie lista amatorskich drużyn z Warszawy.</p>
  <p><a href="index.html">← Wróć na stronę główną</a></p>
</header>

<div class="wrap">

  <div class="grid">

    <!-- DRUŻYNA 1 -->
    <div class="team-card">
      <!-- ZMIEN NA NAZWE PLIKU Z LOGO -->
      <img class="team-logo" src="ngks-betoniarze.jpg" alt="NGKS Betoniarze logo" />

      <div>
        <h2 class="team-name">NGKS Betoniarze</h2>
        <p class="team-meta">Warszawa • (liga do uzupełnienia)</p>
        <!-- Na razie może nie prowadzić nigdzie, potem zrobimy profil drużyny -->
        <a class="btn" href="#">Zobacz profil (wkrótce)</a>
      </div>
    </div>

    <!-- TUTAJ DODASZ KOLEJNE DRUŻYNY W TEN SAM SPOSÓB -->

  </div>

</div>

</body>
</html>
