<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Amatorska Warszawa</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background:#0b1220; color:#fff; }
    header { padding: 40px 20px; text-align:center; background:#111a2e; }
    h1 { margin: 0; font-size: 42px; }
    p { opacity: .85; }
    .wrap { max-width: 1000px; margin: 0 auto; padding: 20px; }
    .card { background:#121c33; border:1px solid #223255; border-radius:16px; padding:16px; margin:12px 0; }
    .card:hover {transform:translateY(-5px);border-color:#66a3ff;}
    a { color:#66a3ff; text-decoration:none; }
    .btn {
      display:inline-block;
      padding:10px 16px;
      background:#66a3ff;
      color:#fff;
      border-radius:10px;
      font-weight:bold;
      transition:0.3s;
    }

    .btn:hover {
      background:#4d8ae6;
      transform:translateY(-2px);
    }
  </style>
</head>
<body>
  <header>
    <h1>Amatorska Warszawa</h1>
    <p>Baza amatorskich drużyn, wyniki, tabele i zawodnicy.</p>
  </header>

  <div class="wrap">
    <div class="card">
      <h2>Drużyny</h2>
      <p>Lista wszystkich amatorskich drużyn w Warszawie.</p>
      <br>
      <a href="druzyny.html" class="btn">Przejdź do bazy drużyn →</a>
    </div>
    <div class="card">
      <h2>Wyniki</h2>
      <p>Wkrótce terminarze i wyniki meczów.</p>
    </div>

    <div class="card">
      <h2>Zgłoś drużynę</h2>
      <p>Napisz do mnie: <a href="mailto:AmatorskaWarszawa@gmail.pl">AmatorskaWarszawa@gmail.pl</a></p>
    </div>
  </div>
</body>
</html>
